spring:
  datasource:
    url: jdbc:mysql://localhost:3306/message_in_bottle?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

admin:
  username: admin
  password: 123456

qiniu:
  accessKey: #你的七牛云AK
  secretKey: #你的七牛云SK
  bucket: #存储位置